<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
      <nav class="container nav" aria-label="Main navigation">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
          <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-content">
      {% if page.collection == 'posts' %}
        <section class="section">
          <div class="container prose post-shell">
            <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
            <h1>{{ page.title }}</h1>
            {{ content }}
            <p><a href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a></p>
          </div>
        </section>
      {% else %}
        {{ content }}
      {% endif %}
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p><strong>Email:</strong> <a href="mailto:{{ site.social_links.email }}">{{ site.social_links.email }}</a></p>
        <p>
          <a href="{{ site.social_links.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <span aria-hidden="true">|</span>
          <a href="{{ site.social_links.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
          <span aria-hidden="true">|</span>
          <a href="{{ site.social_links.scholar }}" target="_blank" rel="noopener noreferrer">Google Scholar</a>
        </p>
      </div>
    </footer>
  </body>
</html>
